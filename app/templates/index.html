  <script type="text/javascript">
    $(document).ready(function() {
      // Check login status to display SaaS demo banner
      if (!window.loginUser || !window.loginUser.id) {
        $('#saas-demo-banner').show();
        $('body').css('padding-top', '50px');
      }

      if (window.loginUser && window.loginUser.id) {
        var isPremium = window.loginUser.is_premium;
        
        // Polling check for menu elements loaded by React SPA
        var checkMenuExist = setInterval(function() {
          var menu = $('.ui.menu');
          if (menu.length > 0) {
            clearInterval(checkMenuExist);
            
            var premiumHtml = '';
            if (isPremium) {
              premiumHtml = '<div class="item"><span class="ui yellow label" style="background: linear-gradient(135deg, #FFE000 0%, #799F0C 100%) !important; color: white !important;"><i class="crown icon"></i> Premium Member</span></div>';
            } else {
              premiumHtml = '<div class="item"><button class="ui yellow basic button" id="upgrade-premium-btn" style="border: 1px solid #FFE000 !important; color: #d09c00 !important;"><i class="crown icon"></i> Upgrade to Premium</button></div>';
            }
            
            var rightMenu = menu.find('.right.menu');
            if (rightMenu.length > 0) {
              rightMenu.prepend(premiumHtml);
            }
          }
        }, 300);

        // Bind upgrade modal trigger
        $(document).on('click', '#upgrade-premium-btn', function() {
          // Append modal to body if not already present
          if ($('#premium-modal').length === 0) {
            $('body').append(
              '<div class="ui tiny modal" id="premium-modal" style="z-index: 10001 !important;">' +
              '  <i class="close icon"></i>' +
              '  <div class="header" style="background: #1b1c1d; color: white;"><i class="crown icon" style="color: #FFE000;"></i> Upgrade to Premium Plan</div>' +
              '  <div class="content" style="text-align: center; padding: 2em;">' +
              '    <h3 class="ui header" style="color: #FFE000 !important;">Unlock Unlimited Webhooks & Servers</h3>' +
              '    <p style="color: #8b949e;">Free plan is limited to 3 WebHooks and 1 Server.</p>' +
              '    <div style="background: rgba(83, 109, 254, 0.1); border: 1px solid rgba(83, 109, 254, 0.3); border-radius: 6px; padding: 10px; margin: 15px 0; color: #8c9eff; font-size: 0.9em; text-align: left;">' +
              '      <i class="shield icon"></i> <strong>🔒 专属隐私保护盾 (Private AI Shield)</strong><br/>' +
              '      支持绑定专属私有 AI 节点。您的部署日志与代码绝不用于任何外部大模型的公开训练，安全合规。' +
              '    </div>' +
              '    <div class="ui divider" style="border-top: 1px solid rgba(240,246,252,0.1) !important;"></div>' +
              '    <h2 class="ui green header" style="color: #2ea44f !important;">$9.90 <small style="font-size: 0.6em; color: gray;">/ month</small></h2>' +
              '    <p style="color: #c9d1d9;">Get instant access to unlimited automation workflows, private AI endpoints, and high-speed build queues.</p>' +
              '    <div id="paypal-button-container" style="margin-top: 1.5em; max-width: 350px; margin-left: auto; margin-right: auto;"></div>' +
              '  </div>' +
              '</div>'
            );
          }
          $('#premium-modal').modal('show');

          // Initialize PayPal Smart Buttons (only once)
          if (!window.paypalButtonsRendered) {
            paypal.Buttons({
                style: {
                    shape: 'rect',
                    color: 'gold',
                    layout: 'vertical',
                    label: 'subscribe'
                },
                createSubscription: function(data, actions) {
                  return actions.subscription.create({
                    plan_id: 'P-8UF10924WA311035LNJLBBUQ'
                  });
                },
                onApprove: function(data, actions) {
                  // Verify subscription ID and upgrade user account on backend
                  $.post('/api/user/upgrade_paypal', { subscription_id: data.subscriptionID }, function(res) {
                    if (res.code === 1) {
                      alert('Subscription active! AI has upgraded your account to Premium.');
                      $('#premium-modal').modal('hide');
                      location.reload();
                    } else {
                      alert('Activation failed: ' + res.message);
                    }
                  });
                }
            }).render('#paypal-button-container');
            window.paypalButtonsRendered = true;
          }
        });

        // 1. Hook global ajax responses to capture history list details
        $(document).ajaxComplete(function(event, xhr, settings) {
          if (settings.url.indexOf('/api/history/list') !== -1) {
            try {
              var response = JSON.parse(xhr.responseText);
              if (response.success === 1 && response.data.histories) {
                window.lastHistories = response.data.histories;
              }
            } catch(e) {}
          }
        });

        // 2. Poll to detect visible log modal and inject AI Diagnostic Card
        setInterval(function() {
          var modal = $('.ui.modal:visible');
          if (modal.length > 0 && $('#ai-diagnostic-card').length === 0) {
            var logText = modal.find('pre, code, .content').text();
            if (logText && window.lastHistories) {
              for (var i = 0; i < window.lastHistories.length; i++) {
                var h = window.lastHistories[i];
                if (h.shell_log && logText.indexOf(h.shell_log.substring(0, 50)) !== -1) {
                  if ((h.status === '3' || h.status === '5') && h.ai_analysis) {
                    var cardHtml = 
                      '<div class="ui segment" id="ai-diagnostic-card" style="border: 1px solid rgba(255, 224, 0, 0.4) !important; background: rgba(22, 27, 34, 0.95) !important; margin-top: 15px; text-align: left; width: 100%; box-shadow: 0 4px 20px rgba(0,0,0,0.4) !important;">' +
                      '  <h4 class="ui header" style="color: #FFE000 !important; margin-top: 0;"><i class="robot icon"></i> 🤖 AI Diagnostic Report (智能自愈排障报告)</h4>' +
                      '  <p style="color: #f0f6fc; font-weight: 500; line-height: 1.5;">' + h.ai_analysis + '</p>' +
                      '  <div style="background: rgba(255, 165, 0, 0.08); border: 1px dashed rgba(255, 165, 0, 0.4); border-radius: 6px; padding: 12px; margin: 15px 0; font-size: 0.9em; color: #ffb74d; line-height: 1.4;">' +
                      '    <i class="shield alternate icon"></i> <strong>🔒 隐私安全提示</strong>：' +
                      '    当前排障服务基于公共大模型节点。为确保您的数据安全，平台已对日志进行基础脱敏。请避免在部署输出中打印明文密码及 Key。升级为 <strong>Premium 订阅计划</strong> 后，可自主绑定<strong>私有专属 AI 节点</strong>（数据 100% 隔离，不参与任何模型训练）。' +
                      '  </div>' +
                      (h.ai_fix_suggestion ? 
                      '  <div style="background: #161b22; color: #58a6ff; border: 1px solid rgba(240, 246, 252, 0.1); padding: 12px; border-radius: 6px; font-family: monospace; margin: 10px 0; font-size: 0.9em; white-space: pre-wrap;">' + h.ai_fix_suggestion + '</div>' +
                      '  <button class="ui green button" id="apply-ai-fix-btn" data-history-id="' + h.id + '" style="background: linear-gradient(135deg, #2ea44f 0%, #22863a 100%) !important; color: white !important;"><i class="lightning icon"></i> Apply AI Auto-Fix (一键修复并重新部署)</button>' : '') +
                      '</div>';
                    
                    modal.find('.content').append(cardHtml);
                    // Refresh modal layout to accommodate the newly added card
                    try { modal.modal('refresh'); } catch(e) {}
                    break;
                  }
                }
              }
            }
          }
        }, 500);

        // 3. Bind Apply AI Auto-Fix button handler
        $(document).on('click', '#apply-ai-fix-btn', function() {
          var btn = $(this);
          var historyId = btn.data('history-id');
          btn.addClass('loading');
          
          $.post('/api/history/autofix', { history_id: historyId }, function(res) {
            btn.removeClass('loading');
            if (res.code === 1) {
              alert('AI Auto-Fix applied successfully! Triggering redeployment...');
              $('.ui.modal').modal('hide');
              location.reload();
            } else {
              alert('AI Auto-Fix failed: ' + res.message);
            }
          });
        });

        // 4. Poll to detect visible New WebHook Form and inject AI One-Click Repo Import field
        setInterval(function() {
          var form = $('form.ui.form');
          if (form.length > 0 && form.find('h3:contains("WebHook")').length > 0 && $('#ai-import-field').length === 0) {
            var aiFieldHtml = 
              '<div class="field" id="ai-import-field" style="background: #e0f2f1; padding: 15px; border-radius: 6px; border: 1px solid #009688; margin-bottom: 15px;">' +
              '  <label style="color: #00796b !important; font-weight: bold;"><i class="robot icon"></i> 🤖 AI One-Click Repo Import (AI 一键自动填表)</label>' +
              '  <div class="ui fluid search selection dropdown" id="ai-repos-dropdown" style="margin-top: 5px;">' +
              '    <select id="ai-repos-select">' +
              '      <option value="">Loading your GitHub repositories...</option>' +
              '    </select>' +
              '  </div>' +
              '</div>';
              
            form.find('.three.fields').before(aiFieldHtml);
            
            $.get('/api/github/repos', function(res) {
              var select = $('#ai-repos-select');
              select.empty();
              if (res.code === 1 && res.data.length > 0) {
                select.append('<option value="">-- Choose Repository (选择项目) --</option>');
                res.data.forEach(function(repo) {
                  select.append('<option value="' + repo.name + '" data-clone-url="' + repo.clone_url + '" data-branch="' + repo.default_branch + '">' + repo.name + '</option>');
                });
              } else {
                select.append('<option value="">Error: No repos found or not logged in via GitHub</option>');
              }
            });
          }
        }, 800);

        // 5. Automate form fields filling and AI shell generation on repo selection
        $(document).on('change', '#ai-repos-select', function() {
          var selectedOpt = $(this).find('option:selected');
          var repoName = selectedOpt.val();
          var cloneUrl = selectedOpt.data('clone-url');
          var branch = selectedOpt.data('branch');
          
          if (!repoName) return;
          
          var repoInput = $('form.ui.form input[placeholder*="Name"]');
          var branchInput = $('form.ui.form input[placeholder*="Branch"]');
          var shellTextarea = $('form.ui.form textarea');
          
          // Fill fields and dispatch HTML5 input event to sync React state
          if (repoInput.length > 0) {
            repoInput.val(repoName).trigger('input').trigger('change');
            var event = new Event('input', { bubbles: true });
            repoInput[0].dispatchEvent(event);
          }
          if (branchInput.length > 0) {
            branchInput.val(branch || 'master').trigger('input').trigger('change');
            var event = new Event('input', { bubbles: true });
            branchInput[0].dispatchEvent(event);
          }
          
          if (shellTextarea.length > 0) {
            shellTextarea.val('# AI is analyzing repository structure and generating optimized deploy script...').trigger('input');
            $.post('/api/github/detect_project', { repo_name: repoName }, function(res) {
              if (res.code === 1) {
                shellTextarea.val(res.data.shell_script).trigger('input').trigger('change');
                var event = new Event('input', { bubbles: true });
                shellTextarea[0].dispatchEvent(event);
              } else {
                shellTextarea.val('# AI failed to analyze. Please write deployment script manually.').trigger('input');
              }
            });
          }
        });
      }
    });
  </script>
